<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="et">
<head>
    <meta charset="UTF-8">
    <title>Saaliplaan - Restoran Puri</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f1fa; padding: 40px; }
        h2 { color: #4a3b8d; text-align: center; }

        /* Saaliplaan - tekitame ruudustiku (nt 5x5) */
        .floor-plan {
            display: grid;
            grid-template-columns: repeat(5, 100px);
            grid-template-rows: repeat(5, 100px);
            gap: 20px;
            justify-content: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
            width: max-content;
        }

        /* Üks laud saalis */
        .table-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 2px solid #7157C7;
            background-color: #D2C9ED;
            color: #4a3b8d;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            font-weight: bold;
        }

        .table-item:hover {
            transform: scale(1.05);
            background-color: #b8a9e0;
        }

        /* Soovitatud laud (kuldne) */
        .recommended {
            background-color: #FFD700 !important;
            border-color: #DAA520 !important;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .details { font-size: 0.8em; font-weight: normal; margin-top: 5px; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: #7157C7; text-decoration: none; }
    </style>
</head>
<body>

<h2>Vali endale sobiv laud:</h2>

<div class="floor-plan">
    <a th:each="table : ${tables}" class="table-item" ...>
        <strong style="color: #4a3b8d; display: block;"
                th:text="'Laud ' + ${table.tableNumber}"></strong>
        <span style="color: #4a3b8d; font-size: 0.8em;"
              th:text="${table.places} + ' kohta'"></span>
    </a>
</div>

<a href="/" class="back-link">← Tagasi valikuid muutma</a>

</body>
</html>
